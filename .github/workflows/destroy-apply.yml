name: Destroy Apply (main)

# Triggered on merge/push to main.
#
# Flow:
#   1. plan    — discover resources, generate destroy plan, notify approver
#   2. approve — PAUSE and wait for a human to review and approve/reject
#                (uses GitHub Environment "reset-approval" with required reviewers)
#   3. apply   — execute the destroy plan after approval
#
# Setup required:
#   • GitHub repo Settings → Environments → create "reset-approval"
#   • Add required reviewers to that environment
#   • Add secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   • (Optional) Add secret: SLACK_WEBHOOK_URL for Slack notifications

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      regions:
        description: "Comma-separated AWS regions"
        required: false
        default: "us-east-1"
      services:
        description: "Comma-separated services (blank = all except IAM)"
        required: false
        default: "cloudformation,ec2,s3,rds,lambda,dynamodb,vpc"

permissions:
  contents: read
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Plan
  # Generates the destroy plan. Output is posted to step summary and Slack.
  # ─────────────────────────────────────────────────────────────────────────
  plan:
    name: Generate Destroy Plan
    runs-on: ubuntu-latest
    outputs:
      to-destroy: ${{ steps.plan.outputs.to_destroy }}
      plan-markdown: ${{ steps.read-plan.outputs.content }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run destroy plan
        id: plan
        env:
          AWS_REGIONS: ${{ github.event.inputs.regions || vars.AWS_REGIONS || 'us-east-1' }}
          SERVICES: ${{ github.event.inputs.services || vars.RESET_SERVICES || 'cloudformation,ec2,s3,rds,lambda,dynamodb,vpc' }}
          SKIP_IAM: "true"
        run: |
          set +e
          python main.py plan \
            --regions "$AWS_REGIONS" \
            --services "$SERVICES" \
            --output markdown \
            --save-plan destroy-plan.md
          EXIT_CODE=$?

          # Parse resource count from the JSON plan for outputs
          python main.py plan \
            --regions "$AWS_REGIONS" \
            --services "$SERVICES" \
            --output json \
            --save-plan destroy-plan.json 2>/dev/null || true

          TO_DESTROY=$(python -c "
          import json
          try:
              data = json.load(open('destroy-plan.json'))
              print(data['summary']['to_destroy'])
          except Exception:
              print('0')
          ")
          echo "to_destroy=$TO_DESTROY" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Read plan for output
        id: read-plan
        run: |
          CONTENT=$(cat destroy-plan.md)
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post plan to step summary
        run: |
          echo "## :mag: Destroy Plan" >> "$GITHUB_STEP_SUMMARY"
          cat destroy-plan.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: destroy-plan-${{ github.run_id }}
          path: |
            destroy-plan.md
            destroy-plan.json
          retention-days: 14

      # ── Notify approver via Slack ──────────────────────────────────────
      - name: Notify Slack — approval required
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' && steps.plan.outputs.to_destroy != '0' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TO_DESTROY: ${{ steps.plan.outputs.to_destroy }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":rotating_light: *AWS Destroy Plan — Approval Required*\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Resources to Destroy\", \"value\": \"$TO_DESTROY\", \"short\": true},
                  {\"title\": \"Triggered by\",          \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Branch\",                \"value\": \"${{ github.ref_name }}\", \"short\": true},
                  {\"title\": \"Regions\",               \"value\": \"${{ github.event.inputs.regions || vars.AWS_REGIONS || 'us-east-1' }}\", \"short\": true},
                  {\"title\": \"Review & Approve\",
                   \"value\": \"<$RUN_URL|Click here to review the plan and approve or reject>\",
                   \"short\": false}
                ]
              }]
            }"

      - name: Skip approval notification — nothing to destroy
        if: steps.plan.outputs.to_destroy == '0'
        run: echo "Nothing to destroy — approval gate will be skipped."

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Approve
  # Pauses the workflow and waits for a human reviewer to approve or reject.
  #
  # Reviewers receive an email notification and see the plan from Job 1
  # in the workflow summary before deciding.
  #
  # ✅ Approve → Job 3 (apply) runs
  # ❌ Reject  → Workflow is cancelled, nothing is deleted
  # ─────────────────────────────────────────────────────────────────────────
  approve:
    name: Awaiting Approval
    needs: plan
    if: needs.plan.outputs.to-destroy != '0'
    runs-on: ubuntu-latest
    environment: reset-approval      # <-- Configure required reviewers here
                                     #     Repo Settings → Environments → reset-approval

    steps:
      - name: Approval gate
        run: |
          echo "Approved by: ${{ github.actor }}"
          echo "Resources to destroy: ${{ needs.plan.outputs.to-destroy }}"
          echo "Proceeding to apply..."

      - name: Notify Slack — approved
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \":white_check_mark: *AWS Destroy Plan Approved — Applying now*\",
              \"attachments\": [{
                \"color\": \"good\",
                \"fields\": [
                  {\"title\": \"Approved by\",           \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Resources to Destroy\",  \"value\": \"${{ needs.plan.outputs.to-destroy }}\", \"short\": true},
                  {\"title\": \"Run\",                   \"value\": \"<$RUN_URL|View apply run>\", \"short\": false}
                ]
              }]
            }"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Apply
  # Executes the destroy plan. Only runs after Job 2 is approved.
  # ─────────────────────────────────────────────────────────────────────────
  apply:
    name: Apply Destroy Plan
    needs: [plan, approve]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Apply destroy plan
        env:
          AWS_REGIONS: ${{ github.event.inputs.regions || vars.AWS_REGIONS || 'us-east-1' }}
          SERVICES: ${{ github.event.inputs.services || vars.RESET_SERVICES || 'cloudformation,ec2,s3,rds,lambda,dynamodb,vpc' }}
          SKIP_IAM: "true"
        run: |
          python main.py apply \
            --regions "$AWS_REGIONS" \
            --services "$SERVICES" \
            --confirm

      - name: Post apply summary
        if: always()
        run: |
          echo "## :white_check_mark: Apply Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ----- | ----- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Approved by** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | ${{ github.ref_name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Regions** | ${{ github.event.inputs.regions || vars.AWS_REGIONS || 'us-east-1' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Run** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack — apply complete
        if: ${{ always() && secrets.SLACK_WEBHOOK_URL != '' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          COLOR=$([[ "$JOB_STATUS" == "success" ]] && echo "good" || echo "danger")
          ICON=$([[ "$JOB_STATUS" == "success" ]] && echo ":white_check_mark:" || echo ":x:")
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"$ICON *AWS Destroy Apply — ${JOB_STATUS^^}*\",
              \"attachments\": [{
                \"color\": \"$COLOR\",
                \"fields\": [
                  {\"title\": \"Status\",  \"value\": \"$JOB_STATUS\", \"short\": true},
                  {\"title\": \"Actor\",   \"value\": \"${{ github.actor }}\", \"short\": true},
                  {\"title\": \"Run\",     \"value\": \"<$RUN_URL|View run>\", \"short\": false}
                ]
              }]
            }"
